---
aid: rice
name: Rice University
description: >-
  Rice University is a private research university in Houston, Texas, ranked
  #141 in the QS World University Rankings 2025. Its public developer/API
  footprint is modest and centered on the library's Rice Research Repository
  (R-3), a DSpace 9.x platform that exposes both a REST API and an OAI-PMH
  metadata interface for harvesting theses, dissertations, and scholarship.
  Rice also operates a Shibboleth/SAML identity provider for federated single
  sign-on and publishes a public course schedule. There is an official
  "RiceUniversity" GitHub organization, but it currently has no public
  repositories. No general-purpose, publicly documented developer portal was
  found.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/rice/refs/heads/main/apis.yml
tags:
