    summary: >-
      Verified Rice's public footprint live with no fabrication. The strongest,
      genuinely documented API surface is Fondren Library's Rice Research
      Repository (DSpace 9.3): both its REST API root and OAI-PMH Identify
      endpoint returned 200 with the repositoryName "Rice Research Repository".
      A Shibboleth SAML IdP serves live metadata, and an Atlassian status page
      is published. The course schedule (courses.rice.edu) is a queryable web
      interface, not a formal REST/JSON API. The official RiceUniversity GitHub
      org exists but has zero public repositories. A previously referenced
      third-party RiceAPI (api.riceapps.org) does not resolve and was excluded.
